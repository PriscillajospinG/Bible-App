name: bible_app
description: An AI-powered offline Bible companion app.
version: 1.0.0+1
publish_to: none

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  ffi: ^2.1.3
  shared_preferences: ^2.3.2
  path_provider: ^2.1.5
  share_plus: ^10.0.2
  flutter_local_notifications: ^17.2.4
  timezone: ^0.9.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  flutter_launcher_icons: ^0.13.1

flutter:
  uses-material-design: true

  assets:
    - assets/bible/
    - assets/panic/
    - assets/models/
    - assets/data/

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icon/app_icon.png"